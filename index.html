<!-- index.html - Main file (lightweight!) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JL-Mod Skins Database</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div>
                <h1>🎮 JL-Mod Skins Database</h1>
                <p class="tagline">Effortlessly Find Your Perfect JL-Mod Skins</p>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>
        </div>
    </header>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-number" id="totalSkins">0</div>
            <div class="stat-label">Total Skins</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="showingCount">0</div>
            <div class="stat-label">Showing</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="newCount">0</div>
            <div class="stat-label">New This Week</div>
        </div>
    </div>

    <div class="controls">
        <div class="search-filter">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search skins..." onkeyup="filterSkins()">
            </div>
            <div class="filter-group">
                <button class="filter-btn" data-filter="portrait" onclick="toggleFilter(this, 'orientation')">Portrait</button>
                <button class="filter-btn" data-filter="landscape" onclick="toggleFilter(this, 'orientation')">Landscape</button>
            </div>
        </div>

        <div class="category-tabs">
            <button class="category-tab active" onclick="filterCategory('all')">All Skins</button>
            <button class="category-tab" onclick="filterCategory('device')">📱 Device Skins</button>
            <button class="category-tab" onclick="filterCategory('game')">🎮 Game Skins</button>
            <button class="category-tab" onclick="filterCategory('console')">🕹️ Console Skins</button>
            <button class="category-tab" onclick="filterCategory('custom')">✨ Custom Themes</button>
        </div>
    </div>

    <div class="container">
        <div id="loadingState" class="loading">
            <div class="spinner"></div>
            <p>Loading skins...</p>
        </div>

        <div class="skins-grid" id="skinsGrid"></div>
        
        <div class="load-more-section" id="loadMoreSection">
            <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">
                <span>⬇️ Load More Skins</span>
            </button>
            <div class="load-info" id="loadInfo"></div>
        </div>

        <div class="no-results" id="noResults" style="display: none;">
            No skins found. Try different filters!
        </div>
    </div>

    <div class="modal" id="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <img class="modal-image" id="modalImage" src="" alt="">
            <div class="modal-info" id="modalInfo"></div>
        </div>
    </div>

    <button class="back-to-top" id="backToTop" onclick="scrollToTop()">↑</button>

    <script src="assets/script.js"></script>
</body>
</html>
